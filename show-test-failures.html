<!DOCTYPE html>
<html>
<head><title>Test Failures</title></head>
<body>
<script type="module">
// Run tests and filter for failures
window._TEST_ORCHESTRATED = true;

// Exercise Tests
const exerciseTest = await import('./tests/test-all-exercises.js');
await new Promise(r => setTimeout(r, 50));
const exerciseResults = window._exerciseTestResults;

// Progression Tests  
const progressionTest = await import('./tests/test-all-progressions.js');
await new Promise(r => setTimeout(r, 50));
const progressionResults = window._progressionTestResults;

// Workout Rotation Tests
const rotationTest = await import('./tests/test-workout-rotation.js');
await new Promise(r => setTimeout(r, 50));
const rotationResults = window._workoutRotationTestResults;

// Unlock System Tests
const unlockTest = await import('./tests/test-unlock-system.js');
await new Promise(r => setTimeout(r, 50));
const unlockResults = window._unlockSystemTestResults;

console.log('\n=== EXERCISE TEST FAILURES ===');
exerciseResults.tests.filter(t => !t.passed).forEach(t => {
  console.log(`❌ ${t.category}: ${t.name}`);
  if (t.details) console.log(`   ${t.details}`);
});

console.log('\n=== PROGRESSION TEST FAILURES ===');
progressionResults.tests.filter(t => !t.passed).forEach(t => {
  console.log(`❌ ${t.category}: ${t.name}`);
  if (t.details) console.log(`   ${t.details}`);
});

console.log('\n=== WORKOUT ROTATION FAILURES ===');
rotationResults.tests.filter(t => !t.passed).forEach(t => {
  console.log(`❌ ${t.category}: ${t.name}`);
  if (t.details) console.log(`   ${t.details}`);
});

console.log('\n=== UNLOCK SYSTEM FAILURES ===');
unlockResults.tests.filter(t => !t.passed).forEach(t => {
  console.log(`❌ ${t.category}: ${t.name}`);
  if (t.details) console.log(`   ${t.details}`);
});
</script>
</body>
</html>
